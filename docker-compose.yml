services:

  # ─── Backend services (reseau interne uniquement) ───────────────────────────

  user-service:
    build: ./user-service
    volumes:
      - user-data:/app/data
    environment:
      - DB_PATH=/app/data/users.db
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    volumes:
      - notification-data:/app/data
    environment:
      - DB_PATH=/app/data/notifications.db
    restart: unless-stopped

  account-service:
    build: ./account-service
    volumes:
      - account-data:/app/data
    environment:
      - DB_PATH=/app/data/accounts.db
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  # ─── Frontend (reseau interne uniquement) ───────────────────────────────────

  frontend:
    build: ./frontend
    # ports:
    #   - "3000:3000"
    expose:
      - "3000"
    depends_on:
      - user-service
      - notification-service
      - account-service
    environment:
      - USER_SERVICE_URL=http://user-service:3002
      - ACCOUNT_SERVICE_URL=http://account-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3001
    restart: unless-stopped

volumes:
  user-data:
  notification-data:
  account-data:
