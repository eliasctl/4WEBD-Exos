services:

  # ─── Backend services (reseau interne uniquement) ───────────────────────────

  user-service:
    build: ./user-service
    expose:
      - "${USER_SERVICE_PORT}"
    volumes:
      - user-data:/app/data
    environment:
      - PORT=${USER_SERVICE_PORT}
      - DB_PATH=${USER_DB_PATH}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    expose:
      - "${NOTIFICATION_SERVICE_PORT}"
    volumes:
      - notification-data:/app/data
    environment:
      - PORT=${NOTIFICATION_SERVICE_PORT}
      - DB_PATH=${NOTIFICATION_DB_PATH}
    restart: unless-stopped

  account-service:
    build: ./account-service
    expose:
      - "${ACCOUNT_SERVICE_PORT}"
    volumes:
      - account-data:/app/data
    environment:
      - PORT=${ACCOUNT_SERVICE_PORT}
      - DB_PATH=${ACCOUNT_DB_PATH}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  # ─── Frontend (reseau interne uniquement) ───────────────────────────────────

  frontend:
    build: ./frontend
    # expose:
    #   - "${FRONTEND_PORT}"
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - user-service
      - notification-service
      - account-service
    environment:
      - PORT=${FRONTEND_PORT}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - ACCOUNT_SERVICE_URL=${ACCOUNT_SERVICE_URL}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
    restart: unless-stopped

volumes:
  user-data:
  notification-data:
  account-data:
  