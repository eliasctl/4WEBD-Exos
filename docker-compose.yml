services:

  # ─── Backend services (reseau interne uniquement) ───────────────────────────

  user-service-1:
    build: ./user-service
    volumes:
      - user-data-1:/app/data
    environment:
      - DB_PATH=/app/data/users.db
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - app-net
    restart: unless-stopped

  user-service-2:
    build: ./user-service
    volumes:
      - user-data-2:/app/data
    environment:
      - DB_PATH=/app/data/users.db
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - app-net
    restart: unless-stopped

  user-lb:
    build: ./user-lb
    depends_on:
      - user-service-1
      - user-service-2
    environment:
      - USER_TARGETS=http://user-service-1:3002,http://user-service-2:3002
    networks:
      - app-net
    restart: unless-stopped

  notification-service-1:
    build: ./notification-service
    volumes:
      - notification-data-1:/app/data
    environment:
      - DB_PATH=/app/data/notifications.db
    networks:
      - app-net
    restart: unless-stopped

  notification-service-2:
    build: ./notification-service
    volumes:
      - notification-data-2:/app/data
    environment:
      - DB_PATH=/app/data/notifications.db
    networks:
      - app-net
    restart: unless-stopped

  notification-lb:
    build: ./notification-lb
    depends_on:
      - notification-service-1
      - notification-service-2
    environment:
      - NOTIFICATION_TARGETS=http://notification-service-1:3001,http://notification-service-2:3001
    networks:
      - app-net
    restart: unless-stopped

  account-service:
    build: ./account-service
    volumes:
      - account-data:/app/data
    environment:
      - DB_PATH=/app/data/accounts.db
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - app-net
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "3010:3000"
    expose:
      - "3000"
    depends_on:
      - user-lb
      - notification-lb
      - account-service
    environment:
      - USER_SERVICE_URL=http://user-lb:3005
      - ACCOUNT_SERVICE_URL=http://account-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-lb:3004
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  user-data-1:
  user-data-2:
  notification-data-1:
  notification-data-2:
  account-data:
