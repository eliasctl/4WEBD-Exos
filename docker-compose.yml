services:

  # ─── RabbitMQ ───────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # ─── Backend services (reseau interne uniquement) ───────────────────────────

  user-service-1:
    build: ./user-service
    volumes:
      - user-data:/app/data
    environment:
      - DB_PATH=/app/data/users.db
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_NUMBER=1
    restart: unless-stopped
    networks:
      - app-network

  user-service-2:
    build: ./user-service
    volumes:
      - user-data:/app/data
    environment:
      - DB_PATH=/app/data/users.db
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_NUMBER=2
    restart: unless-stopped
    networks:
      - app-network

  notification-service-1:
    build: ./notification-service
    volumes:
      - notification-data:/app/data
    environment:
      - DB_PATH=/app/data/notifications.db
      - AMQP_URL=amqp://guest:guest@rabbitmq
      - SERVICE_NUMBER=1
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  notification-service-2:
    build: ./notification-service
    volumes:
      - notification-data:/app/data
    environment:
      - DB_PATH=/app/data/notifications.db
      - AMQP_URL=amqp://guest:guest@rabbitmq
      - SERVICE_NUMBER=2
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  notification-worker:
    build: ./notification-service
    command: ["node", "worker.js"]
    volumes:
      - notification-data:/app/data
    environment:
      - DB_PATH=/app/data/notifications.db
      - AMQP_URL=amqp://guest:guest@rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  account-service:
    build: ./account-service
    volumes:
      - account-data:/app/data
    environment:
      - DB_PATH=/app/data/accounts.db
      - JWT_SECRET=${JWT_SECRET}
      - AMQP_URL=amqp://guest:guest@rabbitmq
      - SERVICE_NUMBER=1
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # ─── Load Balancer (NGINX) ─────────────────────────────────────────────────

  lb:
    build: ./lb
    depends_on:
      - user-service-1
      - user-service-2
      - notification-service-1
      - notification-service-2
    restart: unless-stopped
    networks:
      - app-network

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "3010:3000"
    expose:
      - "3000"
    depends_on:
      - lb
      - account-service
    environment:
      - USER_SERVICE_URL=http://lb:3005
      - ACCOUNT_SERVICE_URL=http://account-service:3003
      - NOTIFICATION_SERVICE_URL=http://lb:3004
    restart: unless-stopped
    networks:
      - app-network

volumes:
  user-data:
  notification-data:
  account-data:

networks:
  app-network:
    driver: bridge
