name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-user-service:
    name: User Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-service/package-lock.json
      - run: npm ci
      - run: npm test

  test-notification-service:
    name: Notification Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notification-service/package-lock.json
      - run: npm ci
      - run: npm test
