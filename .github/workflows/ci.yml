name: CI - Run Tests

on:
  push:
    branches-ignore:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-user-service:
    name: Test user-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: user-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  test-account-service:
    name: Test account-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: account-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: account-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  test-notification-service:
    name: Test notification-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4
