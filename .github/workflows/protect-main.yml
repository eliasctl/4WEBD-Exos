name: Protect main - Block direct pushes

on:
  push:
    branches:
      - main-old

permissions:
  contents: read
  pull-requests: read

jobs:
  block-direct-push:
    name: Block direct push to main
    runs-on: ubuntu-latest
    steps:
      - name: Check if push is from a merged PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const mergedPR = prs.find(pr => pr.merged_at);
            if (mergedPR) {
              console.log(`✅ Push from merged PR #${mergedPR.number}. Allowed.`);
              return;
            }
            core.setFailed('❌ Direct pushes to main are not allowed. Please open a pull request.');
