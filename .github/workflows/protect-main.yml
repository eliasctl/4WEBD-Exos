name: Protect main - Block direct pushes

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  block-direct-push:
    name: Block direct push to main
    runs-on: ubuntu-latest
    steps:
      - name: Fail on direct push
        run: |
          echo "❌ Direct pushes to 'main' are not allowed."
          echo "Please open a pull request and have it reviewed before merging."
          exit 0
